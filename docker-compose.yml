services:
  trirechye:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trirechye
    ports:
      - "5100:80"
    restart: unless-stopped

    # Если хочешь править файлы без пересборки контейнера —
    # раскомментируй блок volumes ниже. Внимание: монтируется ТОЛЬКО
    # папка со страницами, не конфиги nginx.
    #
    # volumes:
    #   - ./index.html:/usr/share/nginx/html/index.html:ro
    #   - ./style.css:/usr/share/nginx/html/style.css:ro
    #   - ./world:/usr/share/nginx/html/world:ro
    #   - ./character:/usr/share/nginx/html/character:ro
    #   - ./rules:/usr/share/nginx/html/rules:ro
    #   - ./equipment:/usr/share/nginx/html/equipment:ro