services:
  trirechye:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trirechye
    ports:
      - "8080:80"
    restart: unless-stopped

    # Чтобы править файлы без пересборки контейнера —
    # раскомментируй блок volumes ниже:
    #
    volumes:
       - ./:/usr/share/nginx/html:ro
       - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro