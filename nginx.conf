server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # Главная и обычные страницы
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Кэширование статики
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HTML — короткий кэш
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/html
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/xml
        image/svg+xml;

    # Безопасные заголовки
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Скрыть служебные файлы от веб-доступа
    location ~ /\.(ht|git) { deny all; }
    location ~ ^/(Dockerfile|docker-compose\.yml|nginx\.conf|README\.md)$ {
        deny all;
    }
}